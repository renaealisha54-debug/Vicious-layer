<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 12px;
            background: rgba(10, 10, 15, 0.9);
            color: #E8E8F0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            border: 2px solid #E03060;
            border-radius: 8px;
            overflow: hidden;
        }
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #30E088;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px #30E088;
        }
        .title {
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #666680;
        }
        .content {
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="pulse-dot"></div>
        <div class="title">Hardware Matrix Layer</div>
    </div>
    <div class="content" id="display-text">Initializing Engine...</div>

    <script>
        // Triggered dynamically from Kotlin native invoke
        function updateOverlayText(newText) {
            document.getElementById('display-text').innerText = newText;
        }
    </script>
</body>
</html>
