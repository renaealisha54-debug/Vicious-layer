<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: rgba(10, 10, 15, 0.85);
      border: 1.5px solid #E03060;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'Courier New', monospace;
      min-width: 160px;
      max-width: 280px;
    }
    #overlay-label {
      color: #E8E8F0;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 0.05em;
      word-break: break-word;
    }
    #overlay-sub {
      color: #666680;
      font-size: 10px;
      margin-top: 3px;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div id="overlay-label">ViciousLayer</div>
  <div id="overlay-sub">OVERLAY ACTIVE</div>
  <script>
    function updateOverlayText(text) {
      document.getElementById('overlay-label').textContent = text;
    }
  </script>
</body>
</html>
